# ExoCore — Nginx reverse proxy (runs in Docker)
#
# Single-port architecture: all 3 SPAs served from one server block.
# PWA identity is determined by manifest id + scope, NOT by port.
# Chat:     /chat/       (id: exocore-chat,      scope: /chat/)
# Chronicle:/chronicle/  (id: exocore-chronicle, scope: /chronicle/)
# Council:  /council/    (id: exocore-council,   scope: /council/)
#
# Container 80+443 → host 8080+8443
# All three share the same Django backend (:8000) via /api/* proxy.
# Frontend dist/ folders are bind-mounted → `pnpm build` takes effect immediately.

server {
    listen 80;
    listen 443 ssl;
    server_name localhost my-server 192.168.178.25 100.111.70.110;

    ssl_certificate     /etc/nginx/certs/my-server+4.pem;
    ssl_certificate_key /etc/nginx/certs/my-server+4-key.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    # Redirect root to /chat/
    location = / {
        return 301 $scheme://$http_host/chat/;
    }

    # Fallback favicon for browsers that request it from root
    location = /favicon.svg {
        alias /usr/share/nginx/html/chat/favicon.svg;
    }

    # ── Shared API proxy ──────────────────────────────────────────────
    location /api/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400s;
        proxy_buffering off;
        proxy_cache off;
    }

    location /media/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_set_header Host $host;
    }

    # ── Chat Core SPA ─────────────────────────────────────────────────
    location /chat/ {
        alias /usr/share/nginx/html/chat/;
        index index.html;
        try_files $uri $uri/ /chat/index.html;
    }

    # ── Chronicle SPA ─────────────────────────────────────────────────
    location /chronicle/ {
        alias /usr/share/nginx/html/chronicle/;
        index index.html;
        try_files $uri $uri/ /chronicle/index.html;
    }

    # ── Council SPA ───────────────────────────────────────────────────
    location /council/ {
        alias /usr/share/nginx/html/council/;
        index index.html;
        try_files $uri $uri/ /council/index.html;
    }

    location ~ /\. { deny all; access_log off; }
}
